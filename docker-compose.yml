version: '3.8'

services:
  backend:
    # 1. 修改 build 上下文
    build: 
      context: ./zjus-backend
      dockerfile: Dockerfile
    container_name: zjuers_backend
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - ENVIRONMENT=${ENVIRONMENT}
      - LLM=${LLM}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL}
      - MINIMAX_MODEL=${MINIMAX_MODEL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    # 添加自动重启，防止意外崩溃后不恢复
    restart: always
    volumes:
      - ./zjus-backend/world:/app/world
      - ./zjus-backend/app:/app/app  # 可选：如果为了本地热更新开发，挂载具体的 app 目录

  db:
    image: postgres:15-alpine
    container_name: zjuers_db
    restart: always
    environment:
      POSTGRES_USER: zju
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zjuers
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432" # 即使映射到了宿主机的 15432，容器内部依然是 5432
    # 添加健康检查命令
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U zju -d zjuers" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zjuers_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    build:
      context: ./zjus-backend
      dockerfile: Dockerfile
    container_name: zjuers_migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  nginx:
    image: nginx:latest
    container_name: zjuers_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # 挂载前端打包产物
      - ./zjus-frontend/dist:/usr/share/nginx/game-frontend
      # 🌟 挂载后端的数据字典供 Nginx 直接极速代理（替代旧的 /app/world）
      - ./zjus-backend/world:/usr/share/nginx/world
    depends_on:
      backend:
        condition: service_started
    restart: always

volumes:
  postgres_data:
