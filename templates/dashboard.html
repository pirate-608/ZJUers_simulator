<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZJUers 模拟器 - 游戏进行中</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/driver.js/dist/driver.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.3.1/dist/driver.css">
    <link href="/static/css/style.css" rel="stylesheet">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="icon" href="/static/favicon/favicon.ico">
    <link rel="manifest" href="/static/favicon/site.webmanifest">
    <script src="https://unpkg.com/driver.js/dist/driver.min.js"></script>
    <style>
        /* 局部样式调整 */
        .event-log {
            overflow-y: auto;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
        }

        .bg-light-danger {
            background-color: #fff5f5;
        }

        /* 钉钉消息气泡样式基础 */
        .ding-msg-item {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .ding-avatar {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            background: #0089FF;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">ZJUers Simulator</span>
            <div class="text-white d-flex align-items-center" id="user-info">
                <span id="display-name">Loading...</span> |
                <span id="display-major" class="badge bg-warning text-dark">...</span> |
                <span id="display-semester">大一秋冬</span>
                <a class="btn btn-sm btn-outline-light ms-3" href="https://docs.67656.fun/rules/" target="_blank"
                    rel="noopener">游戏规则</a>
                <div class="ms-3">
                    <button class="btn btn-sm btn-outline-light me-2" onclick="saveGame()" title="手动保存游戏">
                        <i class="bi bi-save"></i> 保存
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="showExitConfirm()" title="退出游戏">
                        <i class="bi bi-box-arrow-right"></i> 退出
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <div class="col-md-3">
                <div class="card mb-3">
                    <div class="card-header bg-info text-white">📚 学在折大</div>
                    <div class="card-body p-2">
                        <div id="course-list" class="list-group list-group-flush course-list-panel">
                            <div class="text-center text-muted py-3">加载中...</div>
                        </div>
                    </div>
                </div>
                <div class="card mb-3">
                    <div class="card-body text-center p-2">
                        <h6 class="card-title mb-1">当前GPA</h6>
                        <h2 class="display-6 text-primary mb-0" id="gpa-display">0.0</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-6">

                <div class="card mb-3" id="mid-panel">
                    <div class="card-header pb-0 bg-white border-0">
                        <ul class="nav nav-tabs card-header-tabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="tab-events-btn" data-bs-toggle="tab"
                                    data-bs-target="#tab-events" type="button" role="tab">📅 求是园动态</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link d-flex align-items-center gap-2" id="tab-ding-btn"
                                    data-bs-toggle="tab" data-bs-target="#tab-ding" type="button" role="tab">
                                    💬 钉钉
                                    <span class="badge bg-danger rounded-pill" id="ding-unread"
                                        style="display:none">0</span>
                                </button>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body p-0">
                        <div class="tab-content" style="height: 260px;">
                            <div class="tab-pane fade show active h-100" id="tab-events" role="tabpanel">
                                <div id="event-log" class="event-log border-0 h-100" style="max-height: 220px;">
                                    <div class="text-muted p-2">连接到折大服务器中...</div>
                                </div>
                                <div class="text-end border-top py-1 px-2 bg-white">
                                    <button class="btn btn-link btn-sm text-decoration-none text-secondary"
                                        onclick="clearLog()">清空日志</button>
                                </div>
                            </div>

                            <div class="tab-pane fade h-100" id="tab-ding" role="tabpanel">
                                <div class="p-0 h-100 d-flex flex-column" style="background: #f7faff;">
                                    <div id="ding-messages" class="p-3" style="height: 200px; overflow-y: auto;">
                                        <div class="text-center text-muted small mt-4">
                                            <p>暂无新消息</p>
                                            <p>班级群通知、辅导员私信将在这里显示</p>
                                        </div>
                                    </div>
                                    <div class="p-2 border-top bg-white">
                                        <form id="ding-form" class="d-flex gap-2" onsubmit="return false;">
                                            <input type="text" id="ding-input" class="form-control form-control-sm"
                                                placeholder="回复消息... (功能开发中)" disabled>
                                            <button class="btn btn-primary btn-sm" type="submit" disabled>发送</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-body py-3 d-flex flex-column gap-2 align-items-stretch">
                        <button id="pause-resume-btn" class="btn btn-outline-danger" onclick="sendAction('pause')">⏸️
                            暂停游戏</button>
                        <div class="btn-group" role="group" aria-label="游戏速度">
                            <button type="button" class="btn btn-sm btn-outline-secondary active"
                                onclick="setGameSpeed(1.0)" id="speed-1.0">1x</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setGameSpeed(1.5)"
                                id="speed-1.5">1.5x</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="setGameSpeed(2.0)"
                                id="speed-2.0">2x</button>
                        </div>
                        <small class="text-muted text-center">⚡ 游戏速度</small>
                        <script>window.addEventListener('DOMContentLoaded', function () { if (window.updatePauseButton) updatePauseButton(); });</script>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="accordion" id="rightPanelAccordion">
                    <!-- 个人状态面板 -->
                    <div class="accordion-item border-0 mb-2">
                        <h2 class="accordion-header" id="headingStats">
                            <button class="accordion-button bg-success text-white py-2" type="button"
                                data-bs-toggle="collapse" data-bs-target="#collapseStats" aria-expanded="true"
                                aria-controls="collapseStats">
                                <strong>📊 个人状态</strong>
                            </button>
                        </h2>
                        <div id="collapseStats" class="accordion-collapse collapse show" aria-labelledby="headingStats">
                            <div class="accordion-body p-3" id="hud-bars">
                                <div class="mb-2">
                                    <div class="d-flex justify-content-between stat-label mb-1">
                                        <span class="small">精力</span> <span id="val-energy"
                                            class="small fw-bold">100/100</span>
                                    </div>
                                    <div class="progress" style="height: 8px;">
                                        <div id="bar-energy" class="progress-bar bg-success" style="width: 100%"></div>
                                    </div>
                                </div>

                                <div class="mb-2">
                                    <div class="d-flex justify-content-between stat-label mb-1">
                                        <span class="small">心态</span> <span id="val-sanity"
                                            class="small fw-bold">50/100</span>
                                    </div>
                                    <div class="progress" style="height: 8px;">
                                        <div id="bar-sanity" class="progress-bar bg-info" style="width: 50%"></div>
                                    </div>
                                </div>

                                <div class="mb-2">
                                    <div class="d-flex justify-content-between stat-label mb-1">
                                        <span class="small">压力</span> <span id="val-stress"
                                            class="small fw-bold">0/100</span>
                                    </div>
                                    <div class="progress" style="height: 8px;">
                                        <div id="bar-stress" class="progress-bar bg-danger" style="width: 0%"></div>
                                    </div>
                                </div>

                                <!-- 学习效率指示器 -->
                                <div class="mb-2 p-2 rounded text-center"
                                    style="background-color: rgba(13, 110, 253, 0.08); border: 1px solid rgba(13, 110, 253, 0.2);">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted" style="font-size: 0.8rem;">📊 学习效率</span>
                                        <span id="efficiency-value" class="fw-bold text-primary">100%</span>
                                    </div>
                                    <div class="small text-muted" id="efficiency-hint"
                                        style="font-size: 0.7rem; margin-top: 2px;">
                                        状态良好
                                    </div>
                                </div>

                                <hr class="my-2">

                                <!-- 精简属性显示 -->
                                <div class="d-flex justify-content-around align-items-center py-2"
                                    style="font-size: 0.9rem;">
                                    <span data-bs-toggle="tooltip" data-bs-placement="top" title="智商"
                                        class="text-center">
                                        <span style="font-size: 1.2rem;">🧠</span><br>
                                        <small id="val-iq" class="fw-bold">--</small>
                                    </span>
                                    <span data-bs-toggle="tooltip" data-bs-placement="top" title="情商"
                                        class="text-center">
                                        <span style="font-size: 1.2rem;">💬</span><br>
                                        <small id="val-eq" class="fw-bold">--</small>
                                    </span>
                                    <span data-bs-toggle="tooltip" data-bs-placement="top" title="运气"
                                        class="text-center">
                                        <span style="font-size: 1.2rem;">🍀</span><br>
                                        <small id="val-luck" class="fw-bold">--</small>
                                    </span>
                                    <span data-bs-toggle="tooltip" data-bs-placement="top" title="风评"
                                        class="text-center">
                                        <span style="font-size: 1.2rem;">⭐</span><br>
                                        <small id="val-reputation" class="fw-bold">0</small>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 摸鱼休闲面板 -->
                    <div class="accordion-item border-0 mb-2">
                        <h2 class="accordion-header" id="headingRelax">
                            <button class="accordion-button collapsed bg-warning text-dark py-2" type="button"
                                data-bs-toggle="collapse" data-bs-target="#collapseRelax" aria-expanded="false"
                                aria-controls="collapseRelax">
                                <strong>☕ 摸鱼休闲</strong>
                            </button>
                        </h2>
                        <div id="collapseRelax" class="accordion-collapse collapse" aria-labelledby="headingRelax">
                            <div class="accordion-body p-3">
                                <div class="d-grid gap-2 relax-actions">
                                    <button id="btn-gym" class="btn btn-sm btn-outline-primary"
                                        onclick="sendAction('relax', 'gym')">🏋️‍♂️ 健身房</button>
                                    <button id="btn-game" class="btn btn-sm btn-outline-success"
                                        onclick="sendAction('relax', 'game')">🎮 打游戏</button>
                                    <button id="btn-cc98" class="btn btn-sm btn-outline-info"
                                        onclick="sendAction('relax', 'cc98')">🌊 刷CC98</button>
                                    <button id="btn-walk" class="btn btn-sm btn-outline-secondary"
                                        onclick="sendAction('relax', 'walk')">🚶 散步启真湖</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 考试控制台面板 -->
                    <div class="accordion-item border-0 mb-2">
                        <h2 class="accordion-header" id="headingExam">
                            <button class="accordion-button bg-danger text-white py-2" type="button"
                                data-bs-toggle="collapse" data-bs-target="#collapseExam" aria-expanded="true"
                                aria-controls="collapseExam">
                                <strong>🔥 学期进度</strong>
                            </button>
                        </h2>
                        <div id="collapseExam" class="accordion-collapse collapse show" aria-labelledby="headingExam">
                            <div class="accordion-body p-0">
                                <div id="exam-console-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script src="https://unpkg.com/driver.js/dist/driver.min.js"></script>
            <script src="/static/js/config.js?v=20260211"></script>
            <script type="module" src="/static/js/main.js?v=20260211"></script>
            <script>
                document.addEventListener('DOMContentLoaded', function () {
                    const dingTab = document.getElementById('tab-ding-btn');
                    const badge = document.getElementById('ding-unread');
                    if (dingTab && badge) {
                        dingTab.addEventListener('shown.bs.tab', () => {
                            badge.innerText = '';
                            badge.style.display = 'none';
                        });
                    }
                });
            </script>

            <div id="tour-finish-anchor"
                style="position:fixed;left:50%;top:55%;width:1px;height:1px;pointer-events:none;"></div>

            <div class="modal fade" id="summaryModal" tabindex="-1" data-bs-backdrop="static">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-primary text-white">
                            <h5 class="modal-title">📄 学期成绩单</h5>
                        </div>
                        <div class="modal-body">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>课程</th>
                                        <th>成绩</th>
                                        <th>绩点</th>
                                    </tr>
                                </thead>
                                <tbody id="transcript-body"></tbody>
                            </table>
                            <div class="alert alert-info text-center">
                                本学期 GPA: <strong id="transcript-gpa" class="fs-4">0.0</strong>
                            </div>
                            <div id="transcript-msg" class="text-center text-muted mb-2"></div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-primary" onclick="nextSemester()">进入下一学年</button>
                        </div>
                    </div>
                </div>
            </div>
</body>

</html>
