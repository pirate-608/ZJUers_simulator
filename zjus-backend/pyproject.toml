[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]

[tool.ruff]
# 设置最大行宽，88 是 Python 社区最常用的标准（同 Black）
line-length = 88
# 假设你使用的是 Python 3.10，可根据实际情况调整
target-version = "py310" 

[tool.ruff.lint]
# 启用的规则集：
# E, W: pycodestyle (基础代码风格)
# F: Pyflakes (逻辑错误，如变量未定义、导入未使用)
# I: isort (自动对 import 进行排序和分组)
# B: flake8-bugbear (发现常见的隐患和设计问题，强烈推荐 FastAPI 使用)
select = ["E", "F", "W", "I", "B"]

# 忽略的规则（如果有的话，可以在这里添加，例如忽略行宽溢出的部分警告）
ignore = []

# 允许 Ruff 自动修复所有它能修复的问题
fixable = ["ALL"]

[tool.ruff.format]
# 强制使用双引号（Python 官方推荐）
quote-style = "double"
# 缩进使用空格
indent-style = "space"
