# Production-oriented Compose stack.
#
# The backend is reachable by Nginx over the Docker network; local host-port
# publishing lives in docker-compose.override.yml.
version: '3.8'

services:
  backend:
    image: ${DOCKER_USERNAME:-pirate608}/zjus-backend:latest
    container_name: zjus_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - ENVIRONMENT=${ENVIRONMENT}
      - LLM=${LLM}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL}
      - MINIMAX_MODEL=${MINIMAX_MODEL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
      seed_embeddings:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    volumes:
      - ./zjus-backend/world:/app/world

  db:
    image: pgvector/pgvector:pg15
    container_name: zjus_db
    restart: always
    environment:
      POSTGRES_USER: zju
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: zjus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U zju -d zjus" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zjus_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  migrate:
    image: ${DOCKER_USERNAME:-pirate608}/zjus-backend:latest
    container_name: zjus_migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed_embeddings:
    image: ${DOCKER_USERNAME:-pirate608}/zjus-backend:latest
    container_name: zjus_seed_embeddings
    command: python scripts/import_character_embeddings.py
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./zjus-backend/world:/app/world
    restart: "no"

  nginx:
    image: ${DOCKER_USERNAME:-pirate608}/zjus-frontend:latest
    container_name: zjus_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # World data is mounted for public developer reference under /world/.
      - ./zjus-backend/world:/usr/share/nginx/world
    depends_on:
      backend:
        condition: service_started
    restart: always

volumes:
  postgres_data:
